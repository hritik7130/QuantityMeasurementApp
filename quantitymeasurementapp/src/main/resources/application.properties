# Application name
spring.application.name=quantity-measurement-app


# =======================
# H2 DATABASE CONFIGURATION -> http://localhost:8080/h2-console
# =======================

# JDBC URL for in-memory H2 database
spring.datasource.url=jdbc:h2:mem:testdb

# H2 database driver
spring.datasource.driverClassName=org.h2.Driver

# Default username for H2
spring.datasource.username=sa

# Default password (empty for H2)
spring.datasource.password=


# =======================
# H2 CONSOLE CONFIGURATION
# =======================

# Enable H2 web console (for testing DB in browser)
spring.h2.console.enabled=true

# URL to access H2 console -> http://localhost:8080/h2-console
spring.h2.console.path=/h2-console


# =======================
# JPA / HIBERNATE CONFIGURATION
# =======================

# Hibernate dialect for H2 database
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Auto update schema based on entity classes
# update = creates/updates tables automatically
spring.jpa.hibernate.ddl-auto=update


# =======================
# SECURITY CONFIGURATION
# =======================

# Disable default Spring Security (no login required)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration


# =======================
# SWAGGER (OpenAPI) CONFIGURATION
# =======================

# Custom path for Swagger UI
# Access: http://localhost:8080/quantity-measurement-app
springdoc.swagger-ui.path=/quantity-measurement-app


# =======================
# SPRING BOOT ACTUATOR CONFIGURATION
# =======================

# Expose specific actuator endpoints over HTTP
management.endpoints.web.exposure.include=health,metrics

# Health endpoint shows application status (UP/DOWN)
# Accessible at: http://localhost:8080/actuator/health

# Metrics endpoint provides application performance data
# Accessible at: http://localhost:8080/actuator/metrics

# Enable detailed health info (optional - useful for debugging)
management.endpoint.health.show-details=always